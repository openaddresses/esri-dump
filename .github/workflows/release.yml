name: NPM Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: npm ci
        run: npm ci

      - name: npm run build
        run: npm run build

      - name: npm publish
        run: npm publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_SECRET }}

      - name: Generate CHANGELOG
        run: ./release ${{ github.ref_name }} > RELEASE

      - name: Github Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE
